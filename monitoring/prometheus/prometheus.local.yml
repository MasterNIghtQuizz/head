global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s
  
scrape_configs:
  - job_name: api-gateway
    static_configs:
      - targets: ["host.docker.internal:3010"]
        labels:
          service: api-gateway
          env: development

  - job_name: ms-user
    static_configs:
      - targets: ["host.docker.internal:4001"]
        labels:
          service: ms-user
          env: development

  - job_name: ms-quizz-management
    static_configs:
      - targets: ["host.docker.internal:4002"]
        labels:
          service: ms-quizz-management
          env: development

  - job_name: ms-session
    static_configs:
      - targets: ["host.docker.internal:4003"]
        labels:
          service: ms-session
          env: development

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

name: CI/CD MasterQuizz

on:
  push:
    branches: [main]
    paths-ignore:
      - "k8s/**"
      - "README.md"
      - ".gitignore"
  workflow_dispatch:
    inputs:
      deploy_all:
        description: "Force redeploy all services?"
        required: true
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  filter:
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.set-services.outputs.services }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        if: github.event_name == 'push'
        with:
          filters: |
            api-gateway:
              - 'packages/api-gateway/**'
              - 'packages/common/**'
              - 'Dockerfile'
              - 'package.json'
              - 'yarn.lock'
            ms-user:
              - 'packages/ms-user/**'
              - 'packages/common/**'
              - 'Dockerfile'
              - 'package.json'
              - 'yarn.lock'
            ms-quizz-management:
              - 'packages/ms-quizz-management/**'
              - 'packages/common/**'
              - 'Dockerfile'
              - 'package.json'
              - 'yarn.lock'
            ms-session:
              - 'packages/ms-session/**'
              - 'packages/common/**'
              - 'Dockerfile'
              - 'package.json'
              - 'yarn.lock'
            ms-response:
              - 'packages/ms-response/**'
              - 'packages/common/**'
              - 'Dockerfile'
              - 'package.json'
              - 'yarn.lock'
            ws-service:
              - 'packages/ws-service/**'
              - 'packages/common/**'
              - 'Dockerfile'
              - 'package.json'
              - 'yarn.lock'


      - name: Set services list
        id: set-services
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ github.event.inputs.deploy_all }}" == "true" ]]; then
            echo 'services=["api-gateway", "ms-user", "ms-quizz-management", "ms-session", "ms-response", "ws-service"]' >> $GITHUB_OUTPUT
          else
            echo 'services=${{ steps.filter.outputs.changes }}' >> $GITHUB_OUTPUT
          fi

  build-and-push:
    needs: filter
    if: ${{ needs.filter.outputs.services != '[]' }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: ${{ fromJson(needs.filter.outputs.services) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          build-args: |
            SERVICE_NAME=${{ matrix.service }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/masterquizz-${{ matrix.service }}:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/masterquizz-${{ matrix.service }}:latest

  update-manifests:
    needs: [filter, build-and-push]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Update Image Tags in K8s Manifests
        run: |
          SERVICES='${{ needs.filter.outputs.services }}'
          SHA='${{ github.sha }}'
          REGISTRY='${{ secrets.DOCKERHUB_USERNAME }}'

          echo "$SERVICES" | jq -r '.[]' | while read service; do
            echo "Updating image for service $service to $SHA"
            for env in dev prod; do
              if [ -d "k8s/services/$service/overlays/$env" ]; then
                cd "k8s/services/$service/overlays/$env"
                kustomize edit set image "victorcra/masterquizz-$service=$REGISTRY/masterquizz-$service:$SHA"
                cd - > /dev/null
              fi
            done
          done

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/
          git commit -m "chore(gitops): update k8s manifests to tag ${{ github.sha }} [skip ci]" || echo "No changes to commit"
          git push origin main

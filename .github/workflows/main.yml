name: QuizzApp CI
on:
  push:
    branches: [feat/CI-1.0, main]
  pull_request:
    branches: [main]

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      packages: ${{ steps.all.outputs.packages || steps.filter.outputs.packages }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Detect changes in packages
        uses: dorny/paths-filter@v2
        id: filter
        with:
          filters: |
            api-gateway:
                - 'packages/api-gateway/**'
                - '!packages/api-gateway/README.md'
            common:
                - 'packages/common/**'
                - '!packages/common/README.md'
            ms-quizz-management:
                - 'packages/ms-quizz-management/**'
                - '!packages/ms-quizz-management/README.md'
            ms-user:
                - 'packages/ms-user/**'
                - '!packages/ms-user/README.md'

      - name: Set all packages for a PR to main, to ensure all packages are tested
        if: ${{ github.event_name == 'pull_request' && github.base_ref == 'main' }}
        id: all
        run: echo 'packages=["api-gateway","common","ms-quizz-management","ms-user"]' >> "$GITHUB_OUTPUT"

  quality:
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.packages != '[]'}}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJson(needs.detect-changes.outputs.packages) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Enable Corepack
        shell: bash
        run: corepack enable

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24.14.0"
          cache: "yarn"

      - name: Install Dependencies
        run: yarn install --frozen-lockfile

      - name: Lint ${{ matrix.package }}
        run: yarn workspace @monorepo/${{ matrix.package }} lint

      - name: Test ${{ matrix.package }} (If defined)
        run: |
          if npm run | grep -q 'test'; then
          echo "Test script found, running tests"
          yarn workspace @monorepo/${{ matrix.package }} test

          else
          echo "No test script, skipping"
          fi

name: E2E Tests

on:
  push:
    branches: [feat/CI-1.0, main]
    paths:
      - "packages/**"
      - "scripts/**"
  pull_request:
    branches: [main]
    paths:
      - "packages/**"
      - "scripts/**"

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate RSA keys
        run: bash scripts/generate-keys.sh

      - name: 🧹 Cleaning previous environment
        run: docker compose --profile test down -v --remove-orphans

      - name: 🏗️ Building test images
        run: |
          docker compose --profile test build \
            api-gateway-test \
            ms-user-test \
            ms-quizz-management-test \
            ms-session-test

      - name: 📡 Starting infrastructure and services
        run: |
          docker compose --profile test up -d \
            postgres-test \
            valkey-test \
            ms-user-test \
            ms-quizz-management-test \
            ms-session-test

      - name: ⏳ Wait for services to be healthy
        shell: bash
        run: |
          wait_for() {
            local NAME=$1
            echo "Waiting for $NAME to become healthy..."
            for i in {1..30}; do
              STATUS=$(docker compose --profile test ps $NAME --format "{{.Health}}")
              echo "   > $NAME current status: ${STATUS:-starting...}"
              if [ "$STATUS" == "healthy" ]; then
                echo "✅ $NAME is healthy!"
                return 0
              fi
              if [ "$STATUS" == "unhealthy" ]; then
                echo "❌ $NAME is unhealthy!"
                docker compose --profile test logs $NAME
                exit 1
              fi
              sleep 5
            done
            echo "❌ Timeout waiting for $NAME"
            docker compose --profile test logs $NAME
            exit 1
          }
          wait_for ms-user-test
          wait_for ms-quizz-management-test
          wait_for ms-session-test

      - name: 🧪 Running E2E Tests
        run: |
          docker compose --profile test run \
            --rm \
            --no-deps \
            -e USER_SERVICE_URL=http://ms-user-test:4011 \
            -e QUIZZ_SERVICE_URL=http://ms-quizz-management-test:4012 \
            -e SESSION_SERVICE_URL=http://ms-session-test:4013 \
            api-gateway-test \
            sh ./scripts/run-e2e.sh

      - name: 🧹 Final cleanup
        if: always()
        run: docker compose --profile test down -v

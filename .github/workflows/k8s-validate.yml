name: K8s Validate

on:
  push:
    paths:
      - "k8s/**"
  pull_request:
    paths:
      - "k8s/**"
  workflow_dispatch:

jobs:
  kube-linter:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Scan manifests with kube-linter
        uses: stackrox/kube-linter-action@v1.0.4
        continue-on-error: true
        with:
          directory: k8s

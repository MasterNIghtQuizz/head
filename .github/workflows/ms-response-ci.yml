name: MS Response Dedicated CI
on:
  push:
    branches: [main]
    paths:
      - "packages/ms-response/**"
      - "packages/common/**"
      - "Dockerfile"
      - ".github/workflows/ms-response-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "packages/ms-response/**"
      - "packages/common/**"
      - "Dockerfile"
      - ".github/workflows/ms-response-ci.yml"

jobs:
  ms-response-ci:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres_password
          POSTGRES_DB: ms_response_test_db
        ports:
          - 5434:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      valkey:
        image: valkey/valkey:7.2
        ports:
          - 6381:6379
        options: >-
          --health-cmd "valkey-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: |
          docker build -t ms-response -f Dockerfile --build-arg SERVICE_NAME=ms-response .

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24.14.0"
          cache: "yarn"

      - name: Install Dependencies
        run: yarn install --frozen-lockfile

      - name: Run Unit Tests
        run: yarn workspace @monorepo/ms-response test:unit

      - name: Run Integration Tests
        env:
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5434
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres_password
          POSTGRES_DB: ms_response_test_db
          VALKEY_HOST: localhost
          VALKEY_PORT: 6381
        run: yarn workspace @monorepo/ms-response test:int

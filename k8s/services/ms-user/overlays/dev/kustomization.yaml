apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
- ../../base

patches:
- patch: |-
    - op: replace
      path: /spec/replicas
      value: 1
    - op: add
      path: /spec/template/spec/containers/0/env/-
      value:
        name: NODE_ENV
        value: "development"
  target:
    kind: Deployment
    name: ms-user

images:
- name: victorcra/masterquizz-ms-user
  newName: victorcra/masterquizz-ms-user
  newTag: 360eded60de0599665f454758cd42e215bf9d7a2

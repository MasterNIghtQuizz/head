apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

  - ../../base

patches:
  - target:
      kind: Deployment
      name: ms-user
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: NODE_ENV
          value: "development"

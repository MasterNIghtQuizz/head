apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
- ../../base

patches:
- patch: |-
    - op: replace
      path: /spec/replicas
      value: 1
    - op: add
      path: /spec/template/spec/containers/0/env/-
      value:
        name: NODE_ENV
        value: "development"
  target:
    kind: Deployment
    name: ms-user

images:
- name: victorcra/masterquizz-ms-user
  newName: victorcra/masterquizz-ms-user
  newTag: bca188cb41857088821e722540c430cdfcdd99d5

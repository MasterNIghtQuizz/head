apiVersion: apps/v1
kind: Deployment
metadata:
  name: ms-user
  labels:
    app: ms-user
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ms-user
  template:
    metadata:
      labels:
        app: ms-user
    spec:
      initContainers:
        - name: migrate-ms-user
          image: victorcra/masterquizz-ms-user:latest
          command:
            ["yarn", "workspace", "@monorepo/ms-user", "run", "migrations:run"]
          env:
            - name: NODE_ENV
              value: "production"
            - name: POSTGRES_HOST
              value: "postgres-service"
            - name: POSTGRES_PORT
              value: "5432"
            - name: POSTGRES_DB
              value: "ms_user_db"
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: masterquizz-db-secrets
                  key: postgres-user
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: masterquizz-db-secrets
                  key: postgres-password
      containers:
        - name: ms-user
          image: DOCKER_USER/masterquizz-ms-user:latest
          ports:
            - containerPort: 3000
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3000"
            - name: POSTGRES_HOST
              value: "postgres-service"
            - name: POSTGRES_PORT
              value: "5432"
            - name: POSTGRES_DB
              value: "ms_user_db"
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: masterquizz-db-secrets
                  key: postgres-user
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: masterquizz-db-secrets
                  key: postgres-password
            - name: KAFKA_BROKERS
              value: '["kafka-service:29092"]'
            - name: VALKEY_HOST
              value: "valkey-service"
            - name: VALKEY_PORT
              value: "6379"
            - name: AUTH_ACCESS_PRIVATE_KEY_PATH
              value: "/etc/auth/access_private.pem"
            - name: AUTH_ACCESS_PUBLIC_KEY_PATH
              value: "/etc/auth/access_public.pem"
              volumeMounts:
                - name: auth-keys
                  mountPath: "/etc/auth"
                  readOnly: true
      volumes:
        - name: auth-keys
          secret:
            secretName: masterquizz-auth-keys
---
apiVersion: v1
kind: Service
metadata:
  name: ms-user
spec:
  type: ClusterIP
  ports:
    - port: 3000
      targetPort: 3000
  selector:
    app: ms-user

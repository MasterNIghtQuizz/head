apiVersion: apps/v1
kind: Deployment
metadata:
  name: ms-quizz-management
  labels:
    app: ms-quizz-management
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ms-quizz-management
  template:
    metadata:
      labels:
        app: ms-quizz-management
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      initContainers:
        - name: migrate-ms-quizz
          image: victorcra/masterquizz-ms-quizz-management:2eeb2c3dcbd7728e4b673c5391ce4f1b2bb50cb4
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "100m"
              memory: "128Mi"
          command:
            [
              "yarn",
              "workspace",
              "@monorepo/ms-quizz-management",
              "run",
              "migrations:run",
            ]
          env:
            - name: NODE_ENV
              value: "production"
            - name: POSTGRES_HOST
              value: "postgres-service"
            - name: POSTGRES_PORT
              value: "5432"
            - name: POSTGRES_DB
              value: "ms_quizz_db"
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: masterquizz-db-secrets
                  key: postgres-user
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: masterquizz-db-secrets
                  key: postgres-password
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      containers:
        - name: ms-quizz-management
          image: victorcra/masterquizz-ms-quizz-management:2eeb2c3dcbd7728e4b673c5391ce4f1b2bb50cb4
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
          ports:
            - containerPort: 3000
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3000"
            - name: POSTGRES_HOST
              value: "postgres-service"
            - name: POSTGRES_PORT
              value: "5432"
            - name: POSTGRES_DB
              value: "ms_quizz_db"
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: masterquizz-db-secrets
                  key: postgres-user
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: masterquizz-db-secrets
                  key: postgres-password
            - name: VALKEY_HOST
              value: "valkey-service"
            - name: VALKEY_PORT
              value: "6379"
            - name: KAFKA_BROKERS
              value: '["kafka-service:29092"]'
            - name: AUTH_INTERNAL_PUBLIC_KEY_PATH
              value: "/etc/auth/internal_public.pem"
            - name: COREPACK_HOME
              value: "/tmp/corepack"
            - name: YARN_CACHE_FOLDER
              value: "/tmp/yarn-cache"
          volumeMounts:
            - name: auth-keys
              mountPath: "/etc/auth"
              readOnly: true
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: auth-keys
          secret:
            secretName: masterquizz-auth-keys
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: ms-quizz-management
spec:
  type: ClusterIP
  ports:
    - port: 3000
      targetPort: 3000
  selector:
    app: ms-quizz-management

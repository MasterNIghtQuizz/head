apiVersion: apps/v1
kind: Deployment
metadata:
  name: ms-quizz-management
  labels:
    app: ms-quizz-management
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ms-quizz-management
  template:
    metadata:
      labels:
        app: ms-quizz-management
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      initContainers:
        - name: migrate-ms-quizz
          image: victorcra/masterquizz-ms-quizz-management:a0c1a69344268d32e97f9d9f58fa786c490706d0
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "100m"
              memory: "128Mi"
          command: ["/bin/sh", "-c"]
          args:
            - |
              node -e "const net = require('net'); const s = () => { const c = net.createConnection(process.env.POSTGRES_PORT, process.env.POSTGRES_HOST).on('connect', () => process.exit(0)).on('error', () => { console.log('waiting for postgres...'); setTimeout(s, 2000); }); }; s();" && yarn workspace @monorepo/ms-quizz-management run migrations:run
          env:
            - name: COREPACK_HOME
              value: "/tmp/corepack"
            - name: YARN_CACHE_FOLDER
              value: "/tmp/yarn-cache"
            - name: NODE_ENV
              value: "production"
            - name: POSTGRES_HOST
              value: "postgres-service"
            - name: POSTGRES_PORT
              value: "5432"
            - name: POSTGRES_DB
              value: "ms_quizz_db"
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: masterquizz-db-secrets
                  key: postgres-user
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: masterquizz-db-secrets
                  key: postgres-password
            - name: VALKEY_HOST
              value: "valkey-service"
            - name: VALKEY_PORT
              value: "6379"
            - name: KAFKA_ENABLED
              value: "false"
            - name: KAFKA_BROKERS
              value: '["kafka-service:29092"]'
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      containers:
        - name: ms-quizz-management
          image: victorcra/masterquizz-ms-quizz-management:a0c1a69344268d32e97f9d9f58fa786c490706d0
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
          ports:
            - containerPort: 3000
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3000"
            - name: POSTGRES_HOST
              value: "postgres-service"
            - name: POSTGRES_PORT
              value: "5432"
            - name: POSTGRES_DB
              value: "ms_quizz_db"
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: masterquizz-db-secrets
                  key: postgres-user
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: masterquizz-db-secrets
                  key: postgres-password
            - name: VALKEY_HOST
              value: "valkey-service"
            - name: VALKEY_PORT
              value: "6379"
            - name: VALKEY_ENABLED
              value: "true"
            - name: KAFKA_ENABLED
              value: "true"
            - name: KAFKA_BROKERS
              value: '["kafka-service:29092"]'
            - name: AUTH_INTERNAL_PUBLIC_KEY_PATH
              value: "/app/keys/internal-public.pem"
            - name: COREPACK_HOME
              value: "/tmp/corepack"
            - name: YARN_CACHE_FOLDER
              value: "/tmp/yarn-cache"
          volumeMounts:
            - name: auth-keys
              mountPath: "/app/keys"
              readOnly: true
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: auth-keys
          secret:
            secretName: masterquizz-auth-keys
            items:
              - key: access_private.pem
                path: access-private.pem
              - key: access_public.pem
                path: access-public.pem
              - key: refresh_private.pem
                path: refresh-private.pem
              - key: refresh_public.pem
                path: refresh-public.pem
              - key: internal_private.pem
                path: internal-private.pem
              - key: internal_public.pem
                path: internal-public.pem
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: ms-quizz-management
spec:
  type: ClusterIP
  ports:
    - port: 3000
      targetPort: 3000
  selector:
    app: ms-quizz-management

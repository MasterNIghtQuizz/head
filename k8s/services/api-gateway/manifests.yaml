apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  labels:
    app: api-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: api-gateway
          image: victorcra/masterquizz-api-gateway:d825b482abcfa05593a0decaf957e1f8ac438002
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
          ports:
            - containerPort: 3000
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3000"
            - name: LOG_LEVEL
              value: "info"
            - name: USER_SERVICE_URL
              value: "http://ms-user:3000"
            - name: QUIZZ_SERVICE_URL
              value: "http://ms-quizz-management:3000"
            - name: KAFKA_BROKERS
              value: '["kafka-service:29092"]'
            - name: VALKEY_HOST
              value: "valkey-service"
            - name: VALKEY_PORT
              value: "6379"
            - name: VALKEY_ENABLED
              value: "true"
            - name: COREPACK_HOME
              value: "/tmp/corepack"
            - name: YARN_CACHE_FOLDER
              value: "/tmp/yarn-cache"
            - name: AUTH_ACCESS_PRIVATE_KEY_PATH
              value: "/app/keys/access-private.pem"
            - name: AUTH_ACCESS_PUBLIC_KEY_PATH
              value: "/app/keys/access-public.pem"
            - name: AUTH_REFRESH_PRIVATE_KEY_PATH
              value: "/app/keys/refresh-private.pem"
            - name: AUTH_REFRESH_PUBLIC_KEY_PATH
              value: "/app/keys/refresh-public.pem"
            - name: AUTH_INTERNAL_PRIVATE_KEY_PATH
              value: "/app/keys/internal-private.pem"
            - name: AUTH_INTERNAL_PUBLIC_KEY_PATH
              value: "/app/keys/internal-public.pem"
          volumeMounts:
            - name: auth-keys
              mountPath: "/app/keys"
              readOnly: true
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: auth-keys
          secret:
            secretName: masterquizz-auth-keys
            items:
              - key: access_private.pem
                path: access-private.pem
              - key: access_public.pem
                path: access-public.pem
              - key: refresh_private.pem
                path: refresh-private.pem
              - key: refresh_public.pem
                path: refresh-public.pem
              - key: internal_private.pem
                path: internal-private.pem
              - key: internal_public.pem
                path: internal-public.pem
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
spec:
  type: NodePort
  ports:
    - port: 80
      targetPort: 3000
      nodePort: 30080
  selector:
    app: api-gateway

apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  labels:
    app: api-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: api-gateway
          image: victorcra/masterquizz-api-gateway:e65c66dbd649b84e697c7061f1446be9594b600d
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
          ports:
            - containerPort: 3000
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3000"
            - name: LOG_LEVEL
              value: "info"
            - name: SERVICES_USER
              value: "http://ms-user:3000"
            - name: SERVICES_QUIZZ
              value: "http://ms-quizz-management:3000"
            - name: KAFKA_BROKERS
              value: '["kafka-service:29092"]'
            - name: COREPACK_HOME
              value: "/tmp/corepack"
            - name: YARN_CACHE_FOLDER
              value: "/tmp/yarn-cache"
            - name: AUTH_ACCESS_PRIVATE_KEY_PATH
              value: "/etc/auth/access_private.pem"
            - name: AUTH_ACCESS_PUBLIC_KEY_PATH
              value: "/etc/auth/access_public.pem"
            - name: COREPACK_HOME
              value: "/tmp/corepack"
            - name: YARN_CACHE_FOLDER
              value: "/tmp/yarn-cache"
          volumeMounts:
            - name: auth-keys
              mountPath: "/etc/auth"
              readOnly: true
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: auth-keys
          secret:
            secretName: masterquizz-auth-keys
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
spec:
  type: NodePort
  ports:
    - port: 80
      targetPort: 3000
      nodePort: 30080
  selector:
    app: api-gateway

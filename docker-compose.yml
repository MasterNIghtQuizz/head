services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: quiz_master_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_password
    ports:
      - "5432:5432"

  api-gateway:
    build:
      context: .
      args:
        SERVICE_NAME: api-gateway
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
    depends_on:
      - postgres

  ms-user:
    build:
      context: .
      args:
        SERVICE_NAME: ms-user
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      POSTGRES_HOST: postgres
    depends_on:
      - postgres

  ms-quizz-management:
    build:
      context: .
      args:
        SERVICE_NAME: ms-quizz-management
    ports:
      - "3002:3002"
    environment:
      PORT: 3002
      POSTGRES_HOST: postgres
    depends_on:
      - postgres

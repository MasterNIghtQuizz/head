x-common-env: &common-env
  POSTGRES_USER: postgres
  POSTGRES_PASSWORD: postgres_password

x-ms-user-db: &ms-user-db
  POSTGRES_HOST: postgres
  POSTGRES_PORT: 5432
  POSTGRES_DB: ms_user_db
  POSTGRES_USER: postgres
  POSTGRES_PASSWORD: postgres_password

x-ms-quizz-db: &ms-quizz-db
  POSTGRES_HOST: postgres
  POSTGRES_PORT: 5432
  POSTGRES_DB: ms_quizz_db
  POSTGRES_USER: postgres
  POSTGRES_PASSWORD: postgres_password

services:
  # ────────────────────────────────────────────────────────
  #  INFRASTRUCTURE — profiles: infra
  # ────────────────────────────────────────────────────────
  postgres:
    profiles: [infra, app]
    image: postgres:16
    environment:
      <<: *common-env
      POSTGRES_DB: quiz_master_db
    ports:
      - "5433:5432"
    volumes:
      - ./init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  valkey:
    profiles: [infra, app]
    image: valkey/valkey:8
    container_name: valkey
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - valkeydata:/data

  kafka:
    profiles: [infra, app]
    image: confluentinc/cp-kafka:7.8.0
    hostname: kafka
    container_name: kafka
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://kafka:29092,CONTROLLER://kafka:29093,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "kafka-broker-api-versions --bootstrap-server localhost:9092 > /dev/null 2>&1",
        ]
      interval: 10s
      timeout: 10s
      retries: 10
    volumes:
      - kafkadata:/var/lib/kafka/data

  kafka-ui:
    profiles: [infra]
    image: provectuslabs/kafka-ui:master
    container_name: kafka-ui
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    depends_on:
      kafka:
        condition: service_healthy

  otel-collector:
    profiles: [monitoring]
    image: otel/opentelemetry-collector:latest
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./monitoring/otel-collector-config.yaml:/etc/otelcol/config.yaml
    ports:
      - "1888:1888"
      - "8888:8888"
      - "8889:8889"
      - "13133:13133"
      - "4317:4317"
      - "4318:4318"
      - "55679:55679"
    healthcheck:
      test: ["CMD", "/otelcol", "status"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      - jaeger

  jaeger:
    profiles: [monitoring]
    image: jaegertracing/jaeger:latest
    ports:
      - "16686:16686"
      - "4317"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --quiet --tries=1 --spider http://localhost:14269/health || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  opensearch:
    profiles: [monitoring]
    image: opensearchproject/opensearch:2.11.0
    container_name: opensearch
    environment:
      - cluster.name=opensearch-cluster
      - node.name=opensearch
      - discovery.type=single-node
      - bootstrap.memory_lock=false
      - "OPENSEARCH_JAVA_OPTS=-Xms2g -Xmx2g"
      - DISABLE_INSTALL_DEMO_CONFIG=true
      - DISABLE_SECURITY_PLUGIN=true
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - opensearchdata:/usr/share/opensearch/data
    ports:
      - "9200:9200"
      - "9600:9600"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -s http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\"\\|\"status\":\"yellow\"'",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  opensearch-dashboards:
    profiles: [monitoring]
    image: opensearchproject/opensearch-dashboards:2.11.0
    container_name: opensearch-dashboards
    ports:
      - "5601:5601"
    environment:
      OPENSEARCH_HOSTS: '["http://opensearch:9200"]'
      DISABLE_SECURITY_DASHBOARDS_PLUGIN: "true"
    depends_on:
      opensearch:
        condition: service_healthy

  # ────────────────────────────────────────────────────────
  #  APPLICATION SERVICES — profile: app
  # ────────────────────────────────────────────────────────
  api-gateway:
    profiles: [app]
    build:
      context: .
      dockerfile: docker/Dockerfile.api-gateway
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      LOG_PRETTY: false
      KAFKA_BROKERS: '["kafka:29092"]'
      USER_SERVICE_URL: "http://ms-user:4001"
      QUIZZ_SERVICE_URL: "http://ms-quizz-management:4002"
      SESSION_SERVICE_URL: "http://ms-session:4003"
      VALKEY_HOST: valkey
      VALKEY_PORT: 6379
      OTEL_ENABLED: ${MONITORING_ENABLED:-false}
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4317"
      OPENSEARCH_ENABLED: ${MONITORING_ENABLED:-false}
      OPENSEARCH_NODE: "http://opensearch:9200"
      OPENSEARCH_INDEX: "logs-api-gateway"
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy

  ms-user:
    profiles: [app]
    build:
      context: .
      dockerfile: docker/Dockerfile.ms-user
    ports:
      - "4001:4001"
    environment:
      NODE_ENV: production
      PORT: 4001
      LOG_PRETTY: false
      <<: *ms-user-db
      KAFKA_BROKERS: '["kafka:29092"]'
      VALKEY_HOST: valkey
      VALKEY_PORT: 6379
      OTEL_ENABLED: ${MONITORING_ENABLED:-false}
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4317"
      OPENSEARCH_ENABLED: ${MONITORING_ENABLED:-false}
      OPENSEARCH_NODE: "http://opensearch:9200"
      OPENSEARCH_INDEX: "logs-ms-user"
    command: >
      sh -c "yarn workspace @monorepo/ms-user run migrations:run &&
             yarn workspace @monorepo/ms-user run start"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      valkey:
        condition: service_healthy

  ms-quizz-management:
    profiles: [app]
    build:
      context: .
      dockerfile: docker/Dockerfile.ms-quizz-management
    ports:
      - "4002:4002"
    environment:
      NODE_ENV: production
      PORT: 4002
      LOG_PRETTY: false
      <<: *ms-quizz-db
      KAFKA_BROKERS: '["kafka:29092"]'
      VALKEY_HOST: valkey
      VALKEY_PORT: 6379
      OTEL_ENABLED: ${MONITORING_ENABLED:-false}
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4317"
      OPENSEARCH_ENABLED: ${MONITORING_ENABLED:-false}
      OPENSEARCH_NODE: "http://opensearch:9200"
      OPENSEARCH_INDEX: "logs-ms-quizz-management"
    command: >
      sh -c "yarn workspace @monorepo/ms-quizz-management run migrations:run &&
             yarn workspace @monorepo/ms-quizz-management run start"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      valkey:
        condition: service_healthy

  ms-session:
    profiles: [app]
    build:
      context: .
      dockerfile: docker/Dockerfile.ms-session
    ports:
      - "4003:4003"
    environment:
      NODE_ENV: production
      PORT: 4003
      LOG_PRETTY: false
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ms_session_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_password
      KAFKA_BROKERS: '["kafka:29092"]'
      VALKEY_HOST: valkey
      VALKEY_PORT: 6379
      OTEL_ENABLED: ${MONITORING_ENABLED:-false}
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4317"
      OPENSEARCH_ENABLED: ${MONITORING_ENABLED:-false}
      OPENSEARCH_NODE: "http://opensearch:9200"
      OPENSEARCH_INDEX: "logs-ms-session"
    command: >
      sh -c "yarn workspace @monorepo/ms-session run migrations:run &&
             yarn workspace @monorepo/ms-session run start"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      valkey:
        condition: service_healthy

  # ────────────────────────────────────────────────────────
  #  TEST SERVICES — profile: test
  # ────────────────────────────────────────────────────────
  postgres-test:
    image: postgres:16
    profiles: [test]
    environment:
      <<: *common-env
      POSTGRES_DB: postgres
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - ./init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
      - pgdata-test:/var/lib/postgresql/data
  api-gateway-test:
    profiles: [test]
    build:
      context: .
      dockerfile: docker/Dockerfile.api-gateway
      args:
        PRODUCTION: "false"
    ports:
      - "3010:3010"
    environment:
      NODE_ENV: test
      PORT: 3010
      KAFKA_BROKERS: "[]"
      KAFKA_ENABLED: "false"
      USER_SERVICE_URL: "http://ms-user-test:4011"
      QUIZZ_SERVICE_URL: "http://ms-quizz-management-test:4012"
      SESSION_SERVICE_URL: "http://ms-session-test:4013"
      VALKEY_HOST: valkey-test
      VALKEY_PORT: 6379
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      valkey-test:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://127.0.0.1:3010/health | grep ok || exit 1",
        ]
      interval: 3s
      timeout: 3s
      retries: 20

  ms-user-test:
    profiles: [test]
    build:
      context: .
      dockerfile: docker/Dockerfile.ms-user
      args:
        PRODUCTION: "false"
    ports:
      - "4011:4011"
    environment:
      NODE_ENV: test
      PORT: 4011
      POSTGRES_HOST: postgres-test
      POSTGRES_PORT: 5432
      POSTGRES_DB: ms_user_test_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_password
      VALKEY_HOST: valkey-test
      VALKEY_PORT: 6379
      KAFKA_BROKERS: "[]"
      KAFKA_ENABLED: "false"
    volumes:
      - .:/app
      - /app/node_modules
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://127.0.0.1:4011/health | grep ok || exit 1",
        ]
      interval: 3s
      timeout: 3s
      retries: 20
      start_period: 20s
    depends_on:
      postgres-test:
        condition: service_healthy

  ms-quizz-management-test:
    profiles: [test]
    build:
      context: .
      dockerfile: docker/Dockerfile.ms-quizz-management
      args:
        PRODUCTION: "false"
    ports:
      - "4012:4012"
    depends_on:
      postgres-test:
        condition: service_healthy
      valkey-test:
        condition: service_healthy
    environment:
      NODE_ENV: test
      PORT: 4012
      POSTGRES_HOST: postgres-test
      POSTGRES_PORT: 5432
      POSTGRES_DB: ms_quizz_test_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_password
      VALKEY_HOST: valkey-test
      VALKEY_PORT: 6379
      KAFKA_BROKERS: "[]"
      KAFKA_ENABLED: "false"
    volumes:
      - .:/app
      - /app/node_modules
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://127.0.0.1:4012/health | grep ok || exit 1",
        ]
      interval: 3s
      timeout: 3s
      retries: 20
      start_period: 20s

  ms-session-test:
    profiles: [test]
    build:
      context: .
      dockerfile: docker/Dockerfile.ms-session
      args:
        PRODUCTION: "false"
    ports:
      - "4013:4013"
    depends_on:
      postgres-test:
        condition: service_healthy
      valkey-test:
        condition: service_healthy
    environment:
      NODE_ENV: test
      PORT: 4013
      POSTGRES_HOST: postgres-test
      POSTGRES_PORT: 5432
      POSTGRES_DB: ms_session_test_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_password
      VALKEY_HOST: valkey-test
      VALKEY_PORT: 6379
      KAFKA_BROKERS: "[]"
      KAFKA_ENABLED: "false"
      QUIZZ_SERVICE_URL: "http://ms-quizz-management-test:4012"
      USER_SERVICE_URL: "http://ms-user-test:4011"
    volumes:
      - .:/app
      - /app/node_modules
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://127.0.0.1:4013/health | grep ok || exit 1",
        ]
      interval: 3s
      timeout: 3s
      retries: 20
      start_period: 20s

  valkey-test:
    image: valkey/valkey:8
    profiles: [test]
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - valkeydata-test:/data

volumes:
  pgdata:
  pgdata-test:
  kafkadata:
  valkeydata:
  valkeydata-test:
  opensearchdata:

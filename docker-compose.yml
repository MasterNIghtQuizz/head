services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: quiz_master_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_password
    ports:
      - "5433:5432"
    volumes:
      - ./init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
      - pgdata:/var/lib/postgresql/data

  api-gateway:
    profiles: [app]
    build:
      context: .
      args:
        SERVICE_NAME: api-gateway
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
    depends_on:
      - postgres

  ms-user:
    profiles: [app]
    build:
      context: .
      args:
        SERVICE_NAME: ms-user
    ports:
      - "4001:4001"
    environment:
      PORT: 4001
      POSTGRES_HOST: postgres
      POSTGRES_DB: ms_user_db
    depends_on:
      - postgres

  ms-quizz-management:
    profiles: [app]
    build:
      context: .
      args:
        SERVICE_NAME: ms-quizz-management
    ports:
      - "4002:4002"
    environment:
      PORT: 4002
      POSTGRES_HOST: postgres
      POSTGRES_DB: ms_quizz_db
    depends_on:
      - postgres

volumes:
  pgdata:

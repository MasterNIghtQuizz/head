<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WebSocket Test Client</title>
    <style>
      :root {
        --bg: #f4f6fb;
        --card: #ffffff;
        --text: #1f2937;
        --muted: #6b7280;
        --accent: #0f766e;
        --accent-hover: #115e59;
        --danger: #b91c1c;
        --border: #d1d5db;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: radial-gradient(
          circle at top right,
          #e6fffb 0%,
          var(--bg) 55%
        );
        color: var(--text);
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 16px;
      }

      .card {
        width: min(900px, 100%);
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 14px;
        box-shadow: 0 12px 30px rgba(0, 0, 0, 0.08);
        overflow: hidden;
      }

      .header {
        padding: 20px;
        border-bottom: 1px solid var(--border);
      }

      .header h1 {
        margin: 0;
        font-size: 1.2rem;
      }

      .header p {
        margin: 6px 0 0;
        color: var(--muted);
        font-size: 0.95rem;
      }

      .content {
        padding: 16px;
        display: grid;
        gap: 16px;
      }

      .row {
        display: grid;
        gap: 8px;
      }

      .row.inline {
        grid-template-columns: 1fr auto auto;
        align-items: end;
      }

      .row.actions {
        grid-template-columns: repeat(4, minmax(120px, 1fr));
        align-items: end;
      }

      label {
        font-size: 0.9rem;
        color: var(--muted);
      }

      input,
      textarea,
      button {
        font: inherit;
      }

      input,
      textarea {
        width: 100%;
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 10px 12px;
        color: var(--text);
        background: #fff;
      }

      textarea {
        min-height: 90px;
        resize: vertical;
      }

      button {
        border: 0;
        border-radius: 10px;
        padding: 10px 14px;
        cursor: pointer;
        color: #fff;
        background: var(--accent);
        transition: background 0.2s ease;
        white-space: nowrap;
      }

      button:hover {
        background: var(--accent-hover);
      }

      button.secondary {
        background: var(--danger);
      }

      button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      .status {
        padding: 8px 10px;
        border-radius: 8px;
        background: #ecfeff;
        color: #155e75;
        border: 1px solid #bae6fd;
        font-size: 0.9rem;
      }

      .status.disconnected {
        background: #fef2f2;
        color: #7f1d1d;
        border-color: #fecaca;
      }

      .logs {
        border: 1px solid var(--border);
        border-radius: 10px;
        background: #0f172a;
        color: #e2e8f0;
        min-height: 240px;
        max-height: 320px;
        overflow: auto;
        padding: 10px;
        font-family:
          ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas,
          "Liberation Mono", "Courier New", monospace;
        font-size: 0.85rem;
        line-height: 1.45;
      }

      .log-line {
        margin: 0;
        white-space: pre-wrap;
        word-break: break-word;
      }

      .hint {
        color: var(--muted);
        font-size: 0.85rem;
        margin-top: -4px;
      }

      .section-title {
        margin: 0;
        font-size: 0.95rem;
        color: #0f172a;
      }

      .screen-link {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: fit-content;
        text-decoration: none;
        border-radius: 10px;
        padding: 10px 14px;
        color: #fff;
        background: #1d4ed8;
        transition: background 0.2s ease;
      }

      .screen-link:hover {
        background: #1e40af;
      }

      @media (max-width: 700px) {
        .row.inline {
          grid-template-columns: 1fr;
        }

        .row.actions {
          grid-template-columns: 1fr 1fr;
        }

        button {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <main class="card">
      <section class="header">
        <h1>WebSocket Test Client</h1>
        <p>Connect to a WebSocket server and quickly test message exchange.</p>
      </section>

      <section class="content">
        <div class="row inline">
          <div>
            <label for="ws-url">WebSocket URL</label>
            <input
              id="ws-url"
              type="text"
              value="ws://localhost:3333"
              placeholder="ws://localhost:3333"
            />
          </div>
          <button id="connect-btn">Connect</button>
          <button id="disconnect-btn" class="secondary" disabled>
            Disconnect
          </button>
        </div>

        <div class="row">
          <label for="user-id">Generated userId (sent as query param)</label>
          <input id="user-id" type="text" readonly />
        </div>

        <div class="row">
          <label for="user-name"
            >Generated userName (sent as query param)</label
          >
          <input id="user-name" type="text" readonly />
        </div>

        <div id="status" class="status disconnected">Disconnected</div>

        <div class="row">
          <label>Navigation Test</label>
          <a class="screen-link" href="./second-screen.html"
            >Go to second screen</a
          >
        </div>

        <div class="row">
          <p class="section-title">Structured WebSocket Actions</p>
          <div class="row inline">
            <div>
              <label for="room-id">Room ID</label>
              <input id="room-id" type="text" placeholder="room-1" />
            </div>
            <div>
              <label for="max-users">Max users</label>
              <input id="max-users" type="number" min="1" value="4" />
            </div>
            <button id="create-room-btn" type="button">Create Room</button>
          </div>

          <div class="row actions">
            <button id="join-room-btn" type="button">Join Room</button>
            <button id="start-room-btn" type="button">Start Room</button>
            <button id="send-chat-btn" type="button">Send Chat</button>
            <button id="prefill-ping-btn" type="button">Prefill Ping</button>
          </div>

          <div class="row inline">
            <div>
              <label for="receiver-id">Chat receiverId</label>
              <input
                id="receiver-id"
                type="text"
                placeholder="target-user-id"
              />
            </div>
            <div style="grid-column: span 2">
              <label for="chat-content">Chat content</label>
              <input id="chat-content" type="text" placeholder="hello" />
            </div>
          </div>
        </div>

        <div class="row">
          <label for="message">Message to send</label>
          <textarea
            id="message"
            placeholder='Type text or JSON, e.g. {"type":"ping"}'
          ></textarea>
          <div class="row inline">
            <div class="hint">
              If message is valid JSON, it will be sent as JSON string.
            </div>
            <button id="send-btn" disabled>Send Message</button>
            <button id="clear-btn" type="button" class="secondary">
              Clear Logs
            </button>
          </div>
        </div>

        <div>
          <label>Logs</label>
          <div id="logs" class="logs" aria-live="polite"></div>
        </div>
      </section>
    </main>

    <script>
      const urlInput = document.getElementById("ws-url");
      const connectBtn = document.getElementById("connect-btn");
      const disconnectBtn = document.getElementById("disconnect-btn");
      const sendBtn = document.getElementById("send-btn");
      const clearBtn = document.getElementById("clear-btn");
      const messageInput = document.getElementById("message");
      const userIdInput = document.getElementById("user-id");
      const userNameInput = document.getElementById("user-name");
      const logs = document.getElementById("logs");
      const status = document.getElementById("status");
      const roomIdInput = document.getElementById("room-id");
      const maxUsersInput = document.getElementById("max-users");
      const receiverIdInput = document.getElementById("receiver-id");
      const chatContentInput = document.getElementById("chat-content");
      const createRoomBtn = document.getElementById("create-room-btn");
      const joinRoomBtn = document.getElementById("join-room-btn");
      const startRoomBtn = document.getElementById("start-room-btn");
      const sendChatBtn = document.getElementById("send-chat-btn");
      const prefillPingBtn = document.getElementById("prefill-ping-btn");
      const apiGatewayBaseUrl = "http://localhost:3000";
      const gatewayWsBootstrapPath = "/websocket/connect";

      let socket = null;
      let accessToken = "";
      const userId = createUuid();
      const userName = createUserName();
      userIdInput.value = userId;
      userNameInput.value = userName;

      function createUuid() {
        if (
          globalThis.crypto &&
          typeof globalThis.crypto.randomUUID === "function"
        ) {
          return globalThis.crypto.randomUUID();
        }

        return "xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx".replace(/[xy]/g, (c) => {
          const r = Math.floor(Math.random() * 16);
          const v = c === "x" ? r : (r & 0x3) | 0x8;
          return v.toString(16);
        });
      }

      function createUserName() {
        const adjectives = [
          "brave",
          "calm",
          "quick",
          "curious",
          "sharp",
          "kind",
          "bright",
          "bold",
        ];
        const animals = [
          "otter",
          "falcon",
          "lynx",
          "tiger",
          "fox",
          "panda",
          "wolf",
          "dolphin",
        ];

        const adjective =
          adjectives[Math.floor(Math.random() * adjectives.length)];
        const animal = animals[Math.floor(Math.random() * animals.length)];
        const suffix = Math.floor(Math.random() * 9000) + 1000;

        return `${adjective}-${animal}-${suffix}`;
      }

      function setConnectedUI(isConnected) {
        connectBtn.disabled = isConnected;
        disconnectBtn.disabled = !isConnected;
        sendBtn.disabled = !isConnected;
        createRoomBtn.disabled = !isConnected;
        joinRoomBtn.disabled = !isConnected;
        startRoomBtn.disabled = !isConnected;
        sendChatBtn.disabled = !isConnected;
        prefillPingBtn.disabled = !isConnected;
        status.textContent = isConnected ? "Connected" : "Disconnected";
        status.classList.toggle("disconnected", !isConnected);
      }

      function sendJsonMessage(message) {
        if (!socket || socket.readyState !== WebSocket.OPEN) {
          addLog("error", "Socket is not connected.");
          return;
        }

        const raw = JSON.stringify(message);
        socket.send(raw);
        addLog("sent", raw);
      }

      function addLog(type, data) {
        const time = new Date().toLocaleTimeString();
        const line = document.createElement("p");
        line.className = "log-line";
        line.textContent = `[${time}] ${type}: ${data}`;
        logs.appendChild(line);
        logs.scrollTop = logs.scrollHeight;
      }

      async function fetchAccessToken() {
        const response = await fetch(
          `${apiGatewayBaseUrl}/helpers/access-token`,
          {
            method: "POST",
            headers: {
              accept: "application/json",
              "content-type": "application/json",
            },
            body: JSON.stringify({ userId, role: "user" }),
          },
        );

        if (!response.ok) {
          throw new Error(`Failed to get access token (${response.status}).`);
        }

        const payload = await response.json();
        if (!payload?.token) {
          throw new Error("Gateway did not return a token.");
        }

        return payload.token;
      }

      async function bootstrapWebSocketWithGateway(token) {
        const response = await fetch(
          `${apiGatewayBaseUrl}${gatewayWsBootstrapPath}`,
          {
            method: "POST",
            headers: {
              accept: "application/json",
              "access-token": token,
            },
          },
        );

        if (!response.ok) {
          const text = await response.text();
          throw new Error(
            `Gateway bootstrap failed (${response.status}): ${text || "no body"}`,
          );
        }

        const payload = await response.json();
        if (!payload?.wsUrl || !payload?.userId) {
          throw new Error("Gateway did not return wsUrl/userId.");
        }

        return payload;
      }

      connectBtn.addEventListener("click", async () => {
        const url = urlInput.value.trim();
        if (!url) {
          addLog("error", "Please provide a WebSocket URL.");
          return;
        }

        if (socket && socket.readyState === WebSocket.OPEN) {
          addLog("info", "Already connected.");
          return;
        }

        connectBtn.disabled = true;

        let bootstrapData = null;

        try {
          addLog("system", "Requesting access token from API gateway...");
          accessToken = await fetchAccessToken();
          addLog("system", "Access token received.");

          addLog("system", "Calling API gateway to bootstrap WebSocket...");
          bootstrapData = await bootstrapWebSocketWithGateway(accessToken);
          addLog(
            "system",
            `Gateway bootstrap call succeeded (userId=${bootstrapData.userId}).`,
          );
        } catch (error) {
          connectBtn.disabled = false;
          addLog(
            "error",
            error?.message ||
              "Failed to authenticate/bootstrap with API gateway.",
          );
          return;
        }

        try {
          const wsBase = bootstrapData?.wsUrl || url;
          const wsUrl = new URL(wsBase);
          const effectiveUserId = bootstrapData?.userId || userId;

          wsUrl.searchParams.set("userId", effectiveUserId);
          wsUrl.searchParams.set("userName", userName);

          userIdInput.value = effectiveUserId;
          socket = new WebSocket(wsUrl.toString());
          addLog("system", `Connecting to ${wsUrl.toString()} ...`);
        } catch (error) {
          addLog("error", error.message || "Failed to create WebSocket.");
          connectBtn.disabled = false;
          return;
        }

        socket.addEventListener("open", () => {
          setConnectedUI(true);
          addLog("system", "Connection opened.");
        });

        socket.addEventListener("message", (event) => {
          addLog("recv", event.data);

          try {
            const parsed = JSON.parse(event.data);
            if (parsed?.type === "room_started") {
              sessionStorage.setItem(
                "last-room-started",
                JSON.stringify(parsed),
              );
              addLog(
                "system",
                "Room started received, navigating to second-screen.html",
              );
              window.location.href = "./second-screen.html";
            }
          } catch (_err) {
            // Non-JSON messages are still logged above.
          }
        });

        socket.addEventListener("close", (event) => {
          setConnectedUI(false);
          connectBtn.disabled = false;
          addLog(
            "system",
            `Connection closed (code=${event.code}, reason=${event.reason || "none"}).`,
          );
        });

        socket.addEventListener("error", () => {
          connectBtn.disabled = false;
          addLog("error", "WebSocket error occurred.");
        });
      });

      disconnectBtn.addEventListener("click", () => {
        if (!socket) return;
        socket.close(1000, "Client disconnect");
      });

      sendBtn.addEventListener("click", () => {
        if (!socket || socket.readyState !== WebSocket.OPEN) {
          addLog("error", "Socket is not connected.");
          return;
        }

        const raw = messageInput.value;
        if (!raw.trim()) {
          addLog("error", "Message is empty.");
          return;
        }

        let payload = raw;
        try {
          payload = JSON.stringify(JSON.parse(raw));
        } catch (_err) {
          // Keep raw text when it is not JSON.
        }

        socket.send(payload);
        addLog("sent", payload);
      });

      clearBtn.addEventListener("click", () => {
        logs.textContent = "";
      });

      createRoomBtn.addEventListener("click", () => {
        const roomId = roomIdInput.value.trim();
        const maxUsers = Number(maxUsersInput.value);
        if (!roomId) {
          addLog("error", "roomId is required.");
          return;
        }
        if (!Number.isInteger(maxUsers) || maxUsers <= 0) {
          addLog("error", "max_users must be a positive integer.");
          return;
        }

        sendJsonMessage({
          type: "create_room",
          payload: { roomId, max_users: maxUsers },
        });
      });

      joinRoomBtn.addEventListener("click", () => {
        const roomId = roomIdInput.value.trim();
        if (!roomId) {
          addLog("error", "roomId is required.");
          return;
        }

        sendJsonMessage({
          type: "join_room",
          payload: { roomId },
        });
      });

      startRoomBtn.addEventListener("click", () => {
        const roomId = roomIdInput.value.trim();
        if (!roomId) {
          addLog("error", "roomId is required.");
          return;
        }

        sendJsonMessage({
          type: "start_room",
          payload: { roomId },
        });
      });

      sendChatBtn.addEventListener("click", () => {
        const receiverId = receiverIdInput.value.trim();
        const content = chatContentInput.value.trim();
        if (!receiverId) {
          addLog("error", "receiverId is required for chat message.");
          return;
        }

        sendJsonMessage({
          type: "chat_message",
          payload: { receiverId, content },
        });
      });

      prefillPingBtn.addEventListener("click", () => {
        messageInput.value = JSON.stringify(
          {
            type: "chat_message",
            payload: {
              receiverId: receiverIdInput.value.trim() || "receiver-id",
              content: "Hello from test client",
            },
          },
          null,
          2,
        );
      });

      setConnectedUI(false);
    </script>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Second Screen</title>
    <style>
      :root {
        --bg: #f7f7f2;
        --panel: #ffffff;
        --text: #1d2a2f;
        --accent: #14532d;
        --border: #d4d4d4;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 16px;
        background:
          radial-gradient(circle at 15% 20%, #e4f7e9 0%, transparent 42%),
          radial-gradient(circle at 85% 80%, #fff1dc 0%, transparent 38%),
          var(--bg);
        color: var(--text);
        font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      }

      main {
        width: min(720px, 100%);
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 28px;
        box-shadow: 0 12px 28px rgba(0, 0, 0, 0.08);
      }

      h1 {
        margin: 0 0 12px;
      }

      p {
        margin: 0 0 20px;
        line-height: 1.5;
      }

      a {
        display: inline-block;
        text-decoration: none;
        background: var(--accent);
        color: #fff;
        border-radius: 10px;
        padding: 10px 14px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Second Screen</h1>
      <p>
        This page exists only as a navigation target for WebSocket-driven screen
        change tests.
      </p>
      <a href="./index.html">Back to WebSocket Client</a>
    </main>
  </body>
</html>
